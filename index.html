<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Copper Roost</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Lato&family=Cinzel&display=swap" rel="stylesheet">

<style>
:root {
  --accent:#D58822;
  --accent-soft:#e2a24e;
  --text:#1a1a1a;
  --bg:#fcfaf7;
  --bg-alt:#f3eee7;
  --border:rgba(0,0,0,0.12);
}

body{
  margin:0;
  font-family:Lato,sans-serif;
  background:var(--bg);
  color:var(--text);
}

.section-inner{
  max-width:1100px;
  margin:auto;
  padding:5rem 2rem;
}

.section-heading{
  font-family:Playfair Display,serif;
  font-size:2.5rem;
  margin-bottom:1rem;
}

.section-label{
  font-family:Cinzel;
  letter-spacing:0.3em;
  font-size:0.7rem;
  color:var(--accent);
}

.btn-primary{
  background:var(--accent);
  color:#fff;
  padding:1rem 2rem;
  border:none;
  cursor:pointer;
}

.btn-outline{
  border:1px solid var(--text);
  padding:1rem 2rem;
  text-decoration:none;
  color:var(--text);
}

#hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  background:linear-gradient(#fcfaf7,#efe7dd);
}

.hero-title{
  font-size:4rem;
  font-family:Cinzel;
}

/* Amenities centered */
.amenity-card{
  text-align:center;
  padding:2rem;
}

/* Gallery */
.gallery-featured{
  aspect-ratio:16/9;
  margin-bottom:1rem;
}

.gallery-featured img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.gallery-thumbs{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.gallery-thumb{
  cursor:pointer;
}

.gallery-thumb img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* Form */
.form-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:1rem;
}

.form-row-4{
  grid-template-columns:repeat(4,1fr);
}

.form-group{
  margin-bottom:1rem;
}

input,textarea{
  width:100%;
  padding:0.8rem;
}

/* Book tab */
.fixed-book{
  position:fixed;
  right:-30px;
  top:50%;
  transform:rotate(90deg);
  background:var(--accent);
  color:white;
  padding:0.5rem 1rem;
}

</style>
</head>

<body>

<a class="fixed-book" href="#">BOOK NOW</a>

<section id="hero">
  <div>
    <div class="hero-title">The Copper Roost</div>
    <p>Getaway. Relax. Recharge.</p>
  </div>
</section>

<section id="gallery">
  <div class="section-inner">
    <div class="section-label">Gallery</div>
    <h2 class="section-heading">See the Space</h2>

    <div class="gallery-featured">
      <img id="featured-image">
    </div>

    <div class="gallery-thumbs" id="gallery-thumbs"></div>

    <button class="btn-outline" onclick="openLightbox()">View More Photos</button>
  </div>
</section>

<section id="amenities">
  <div class="section-inner">
    <div class="section-label">Amenities</div>
    <h2 class="section-heading">Every Detail</h2>

    <div class="amenity-card">Movie Room</div>
    <div class="amenity-card">Game Room</div>
    <div class="amenity-card">Patio</div>
  </div>
</section>

<section id="events">
  <div class="section-inner">
    <div class="section-label">Events</div>
    <h2 class="section-heading">Event Request Form</h2>

<form>
<div class="form-row">
  <input placeholder="First Name">
  <input placeholder="Last Name">
</div>

<div class="form-row">
  <input placeholder="Phone">
  <input placeholder="Email">
</div>

<input placeholder="Type of Event">
<input placeholder="Estimated Attendees">

<div class="form-row-4">
  <input type="date">
  <input type="time" placeholder="Start Time">
  <input type="date">
  <input type="time" placeholder="End Time">
</div>

<textarea placeholder="Additional Info"></textarea>

<button class="btn-primary">Submit</button>
</form>

  </div>
</section>

<script>
let images=[];
let index=0;

fetch('photos/manifest.json')
.then(r=>r.json())
.then(data=>{
  images=data.map(f=>'photos/'+f);
  document.getElementById('featured-image').src=images[0];

  const thumbs=document.getElementById('gallery-thumbs');

  images.slice(0,4).forEach((src,i)=>{
    let div=document.createElement('div');
    div.className='gallery-thumb';
    div.innerHTML=`<img src="${src}">`;
    div.onclick=()=>{
      document.getElementById('featured-image').src=src;
      index=i;
    }
    thumbs.appendChild(div);
  });
});

function openLightbox(){
  alert('Hook up lightbox here');
}
</script>

</body>
</html>
