<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Copper Roost</title>

<style>
body { margin:0; font-family:Arial, sans-serif; }

/* SIMPLE LAYOUT FOR DEMO */
section { padding:60px 20px; }
footer { padding:40px; text-align:center; background:#eee; }

/* ───────────────────────────── */
/* EVENTS FIX (THIS IS THE MAGIC) */
/* ───────────────────────────── */

.events-collapsible {
  display: none; /* <-- removes ALL ghost space */
}

.events-inner {
  height: 0;
  overflow: hidden;
  transition: height 0.4s ease;
}

/* Button */
.toggle {
  padding:15px 25px;
  cursor:pointer;
  border:1px solid #333;
  display:inline-block;
  margin-bottom:20px;
}
</style>
</head>

<body>

<section>
  <h1>Hero Section</h1>
</section>

<section>
  <h2>Content Section</h2>
  <p>Some content here...</p>
</section>

<!-- EVENTS -->
<section>
  <h2>Events</h2>

  <div class="toggle" id="toggleBtn">Toggle Form</div>

  <div class="events-collapsible" id="eventsWrap">
    <div class="events-inner" id="eventsInner">

      <div style="padding:20px; background:#f7f7f7;">
        <p>This is your event form area.</p>
        <p>Add your full form here.</p>
        <p>More content...</p>
        <p>More content...</p>
        <p>More content...</p>
      </div>

    </div>
  </div>

</section>

<footer>
  Footer sits exactly where it should now 👍
</footer>

<script>
const btn = document.getElementById('toggleBtn');
const wrap = document.getElementById('eventsWrap');
const inner = document.getElementById('eventsInner');

let open = false;
let animating = false;

btn.addEventListener('click', () => {
  if (animating) return;

  if (!open) {
    // OPEN
    animating = true;
    wrap.style.display = 'block';

    requestAnimationFrame(() => {
      const h = inner.scrollHeight;
      inner.style.height = h + 'px';
    });

    inner.addEventListener('transitionend', function handler(e) {
      if (e.propertyName !== 'height') return;
      inner.style.height = 'auto';
      inner.removeEventListener('transitionend', handler);
      animating = false;
    });

  } else {
    // CLOSE
    animating = true;

    inner.style.height = inner.scrollHeight + 'px';

    requestAnimationFrame(() => {
      inner.style.height = '0px';
    });

    inner.addEventListener('transitionend', function handler(e) {
      if (e.propertyName !== 'height') return;
      wrap.style.display = 'none'; // <-- critical fix
      inner.removeEventListener('transitionend', handler);
      animating = false;
    });
  }

  open = !open;
});
</script>

</body>
</html>
